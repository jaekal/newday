<!--public/management/portal.html-->

<!doctype html>
<html lang="en"><!-- theme applied by nav.js -->
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Management Dashboard – 6S Tool Suite</title>
  <link rel="icon" href="/images/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css"/>
  <!-- Apply saved theme before first paint (external script, CSP-safe) -->
  <script src="/theme-init.js"></script>
  <style>
    .wrap { max-width:1200px; margin:0 auto; padding:1rem; }
    .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin:1rem 0; }
    @media(max-width:700px){ .kpis { grid-template-columns:1fr; } }
    .card { border:1px solid var(--border); background:var(--surface); border-radius:.6rem; box-shadow:var(--shadow); padding:1rem; }
    .kpi { display:flex; flex-direction:column; gap:.2rem; }
    .kpi-label { font-size:.82rem; color:var(--fg-muted); font-weight:600; }
    .kpi-value { font-size:2rem; font-weight:800; line-height:1; display:flex; align-items:baseline; gap:.4rem; }
    .kpi-trend { font-size:.85rem; font-weight:700; }
    .kpi-trend--up   { color:var(--ok); }
    .kpi-trend--down { color:var(--danger); }
    .kpi-trend--flat { color:var(--fg-muted); }
    .kpi-sub { font-size:.82rem; color:var(--fg-muted); margin-top:.2rem; }
    .lists { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-top:1rem; }
    @media(max-width:700px){ .lists { grid-template-columns:1fr; } }
    .table { width:100%; border-collapse:collapse; font-size:.88rem; }
    .table th,.table td { border:1px solid var(--border); padding:.4rem .5rem; }
    .table th { background:var(--accent); color:var(--accent-contrast); font-weight:700; }
    .table tbody tr:nth-child(even) { background:var(--row-stripe); }
    .table tbody tr:hover { background:var(--row-hover); }
    .bucket-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; margin-top:.35rem; }
    .bucket { border:1px dashed var(--border); border-radius:.5rem; padding:.45rem; text-align:center; }
    .bucket-name { font-size:.75rem; color:var(--fg-muted); }
    .bucket-num  { font-size:1.2rem; font-weight:800; }
    .bar-track { height:6px; background:var(--border); border-radius:3px; margin:.25rem 0; overflow:hidden; }
    .bar { height:6px; background:var(--accent); border-radius:3px; transition:width .4s ease; }
    .trend-wrap { position:relative; height:280px; }
    /* Skeleton overrides for KPI shape */
    .kpi-skeleton .kpi-value { height:2rem; background:none; }

  </style>
</head>
<body>
  <div class="wrap">
    <!-- Suite Topbar -->
    <header class="suite-topbar" style="margin-bottom:1rem">
      <div class="brand">
        <div class="brand-title" style="display:flex;align-items:center;gap:.4rem"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Management Dashboard</div>
        <div class="brand-subtitle">KPIs, Kanban trends &amp; operational health</div>
      </div>
      <div class="suite-actions">
        <a href="/home" class="home-button" style="display:inline-flex;align-items:center;gap:.35rem"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
        <button type="button" class="btn-icon" title="Keyboard shortcuts (?)"
          onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'?',bubbles:true}))">⌨</button>
        <label for="themeSelector" class="visually-hidden">Theme</label>
        <select id="themeSelector" class="theme-select" aria-label="Theme">
          <option value="theme-command">Command</option>
<option value="theme-beacon">Beacon</option>
<option value="theme-atlas">Atlas</option>
<option value="theme-carbon">Carbon</option>
<option value="theme-grove">Grove</option>
<option value="theme-ember">Ember</option>
<option value="theme-harbor">Harbor</option>
<option value="theme-slate">Slate</option>
<option value="theme-orchid">Orchid</option>
<option value="theme-dusk">Dusk</option>
<option value="theme-pulse">Pulse</option>
<option value="theme-highcontrast">High Contrast</option>
        </select>
        <button class="btn-secondary" id="refreshBtn" type="button" title="Refresh data" style="display:inline-flex;align-items:center;gap:.35rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Refresh</button>
      </div>
    </header>

    <!-- KPI skeleton (shown while loading) -->
    <div class="kpis" id="kpi-skeleton" aria-hidden="true">
      <div class="card kpi"><div class="kpi-label"><span class="skeleton skeleton-row skeleton-row--short"></span></div><div class="kpi-value"><span class="skeleton skeleton-kpi"></span></div></div>
      <div class="card kpi"><div class="kpi-label"><span class="skeleton skeleton-row skeleton-row--short"></span></div><div class="kpi-value"><span class="skeleton skeleton-kpi"></span></div></div>
      <div class="card kpi"><div class="kpi-label"><span class="skeleton skeleton-row skeleton-row--short"></span></div><div class="kpi-value"><span class="skeleton skeleton-kpi"></span></div></div>
    </div>

    <div class="kpis" id="kpi-cards" style="display:none">
      <!-- Tools Available -->
      <div class="card kpi">
        <div class="kpi-label">Tools Available</div>
        <div class="kpi-value">
          <span id="k-tools-available">–</span>
          <span class="kpi-trend" id="trend-tools-available"></span>
        </div>
        <div class="kpi-sub">Total: <strong id="k-tools-total">–</strong></div>
      </div>

      <!-- Checked Out -->
      <div class="card kpi">
        <div class="kpi-label">Checked Out</div>
        <div class="kpi-value">
          <span id="k-tools-out">–</span>
          <span class="kpi-trend" id="trend-tools-out"></span>
        </div>
        <div class="kpi-sub">Open audits: <strong id="k-audits-open">–</strong> / Overdue: <strong id="k-audits-overdue">–</strong></div>
      </div>

      <!-- Kanban Load -->
      <div class="card kpi">
        <div class="kpi-label">Kanban Load</div>
        <div class="bucket-grid">
          <div class="bucket">
            <div class="bucket-name">Todo</div>
            <div class="bar-track"><div class="bar" id="bar-todo" style="width:0%"></div></div>
            <div class="bucket-num" id="cnt-todo">0</div>
          </div>
          <div class="bucket">
            <div class="bucket-name">Doing</div>
            <div class="bar-track"><div class="bar" id="bar-doing" style="width:0%"></div></div>
            <div class="bucket-num" id="cnt-doing">0</div>
          </div>
          <div class="bucket">
            <div class="bucket-name">Blocked</div>
            <div class="bar-track"><div class="bar" id="bar-blocked" style="width:0%;background:var(--danger)"></div></div>
            <div class="bucket-num" id="cnt-blocked">0</div>
          </div>
          <div class="bucket">
            <div class="bucket-name">Done</div>
            <div class="bar-track"><div class="bar" id="bar-done" style="width:0%;background:var(--ok)"></div></div>
            <div class="bucket-num" id="cnt-done">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="lists">
      <div class="card">
        <h3 style="margin-bottom:.6rem">Delayed Tickets</h3>
        <table class="table" id="tbl-delayed">
          <thead><tr><th>Title</th><th>Lane</th><th>Due</th><th>Source</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="card">
        <h3 style="margin-bottom:.6rem">Suggestions</h3>
        <table class="table" id="tbl-suggestions">
          <thead><tr><th>Title</th><th>Lane</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:1rem">
      <h3 style="margin-bottom:.75rem">Kanban Trend (last 14 days)</h3>
      <div class="trend-wrap">
        <canvas id="trend-canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/nav.js"></script>
  <script type="module" src="/management/portal.js"></script>
  <script src="/management/portal-init.js"></script>
</body>
</html>
